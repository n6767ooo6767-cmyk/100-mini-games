<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON CLICKER</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <h1>NEON CLICKER</h1>
    <div id="score-board">Очки: <span id="score">0</span></div>

    <button id="clicker-btn" onclick="addScore()">КЛИК!</button>
    <br>
    <button id="upgrade-btn">Купить улучшение</button>
    <br>
    <button id="free-auto" onclick="startFreeAuto()">Бесплатный автоклик (1 кл/сек)</button>
    <br>
    <button id="paid-auto" onclick="window.open('https://buy.stripe.com/test_cNicN5cj9d6BcfmaWbgw000', '_blank')">
        Купить платный автоклик
    </button>

    <script>
        let score = 0;
        let scoreEl = document.getElementById('score');

        // Основной клик
        function addScore() {
            score++;
            scoreEl.innerText = score;
        }

        // Бесплатный автоклик
        function startFreeAuto() {
            setInterval(() => {
                score++;
                scoreEl.innerText = score;
            }, 1000);
        }

        // Платный автоклик (проверка при загрузке)
        function checkPaidStatus() {
            if (localStorage.getItem('paidAutoClicker') === 'true') {
                setInterval(() => {
                    score += 10; // Платный дает +10
                    scoreEl.innerText = score;
                }, 1000);
            }
        }

        // Запуск проверки при открытии страницы
        checkPaidStatus();
    </script>
</body>
</html>
